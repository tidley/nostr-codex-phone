name: Code Call
summary: Control Codex from an Android phone over Nostr.
description: |
  Code Call is an Android client for sending text, voice, and media
  requests to a local Codex worker over encrypted Nostr direct messages.

  It supports multiple repo sessions, voice transcription, routed worker
  sessions, Blossom media uploads, and optional spoken responses.
