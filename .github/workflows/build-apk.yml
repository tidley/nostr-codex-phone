name: Build APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - name: Restore Android signing key
        run: |
          printf '%s' '${{ secrets.ANDROID_KEYSTORE_BASE64 }}' | base64 --decode > android/app/nostr-codex-phone-release.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=app/nostr-codex-phone-release.jks\n' '${{ secrets.ANDROID_KEYSTORE_PASSWORD }}' '${{ secrets.ANDROID_KEYSTORE_PASSWORD }}' '${{ secrets.ANDROID_KEY_ALIAS }}' > android/key.properties

      - run: flutter build apk --release
      - run: cargo build --release --manifest-path rust/Cargo.toml --bin nostr-codex-server
      - run: cp rust/target/release/nostr-codex-server build/nostr-codex-worker-linux-x64

      - uses: actions/upload-artifact@v4
        with:
          name: nostr-codex-phone-release-assets
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/nostr-codex-worker-linux-x64

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/nostr-codex-worker-linux-x64
